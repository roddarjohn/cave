repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-symlinks
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      # - id: no-commit-to-branch
      #   args: [--branch, main]

  - repo: https://github.com/ComPWA/mirrors-taplo
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: sqlfluff-lint
        name: sqlfluff-lint
        language: system
        entry: uv run --group lint sqlfluff lint
        files: \.(sql|sql\.mako)$
        types_or: [file]

      - id: mako-naming
        name: mako-naming
        language: fail
        entry: >-
          Mako templates must use a format prefix:
          .sql.mako, .plpgsql.mako, .py.mako, .rst.mako, etc.
        files: (?:^|/)(?!\.)(?:[^./]+)\.mako$

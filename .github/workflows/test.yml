name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: test (pg${{ matrix.postgres }})
    strategy:
      fail-fast: false
      matrix:
        postgres: ["14", "15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_DB: cave
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres@localhost/cave
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv run tox

      - name: Collect coverage (pg17 only)
        if: matrix.postgres == '17'
        run: |
          uv run python -m slipcover --branch --xml --out coverage.xml \
            --source src/cave -m pytest

      - name: Upload coverage to Codecov
        if: matrix.postgres == '17'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

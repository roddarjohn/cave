name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://roddarjohn.github.io/cave
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: extractions/setup-just@v2
      - run: mkdir -p docs/_generated && just docs
      - name: Deploy to gh-pages
        run: |
          cd docs/_build/html
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy docs"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/roddarjohn/cave.git HEAD:gh-pages
